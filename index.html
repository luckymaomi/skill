<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>rapid-dev-skill</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #111827;
        --muted: #64748b;
        --line: #e5e7eb;
        --paper: #ffffff;
        --soft: #f8fafc;
        --brand-dark: #1d4ed8;
      }

      body {
        min-height: 100vh;
        background: var(--soft);
        color: var(--ink);
      }

      .site-shell {
        max-width: 1120px;
      }

      .prompt-section,
      .skill-section {
        border: 1px solid var(--line);
        background: var(--paper);
      }

      .prompt-section {
        overflow: hidden;
      }

      .download-option {
        display: grid;
        grid-template-columns: 2.5rem 5.5rem minmax(0, 1fr) 2.5rem;
        align-items: center;
        gap: 0.75rem;
        padding: 0.875rem 1rem;
        border-top: 1px solid var(--line);
      }

      .download-option:first-child {
        border-top: 0;
      }

      .system-icon {
        width: 2.5rem;
        height: 2.5rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--line);
        border-radius: 0.5rem;
        background: var(--soft);
        color: var(--ink);
        font-size: 1.25rem;
      }

      .system-name {
        font-weight: 600;
      }

      .instruction-box {
        min-width: 0;
        padding: 0.6rem 0.75rem;
        overflow-x: auto;
        -ms-overflow-style: none;
        scrollbar-width: none;
        border: 1px solid var(--line);
        border-radius: 0.5rem;
        background: var(--soft);
        color: var(--ink);
        font-size: 0.8125rem;
        line-height: 1.55;
        white-space: nowrap;
      }

      .instruction-box::-webkit-scrollbar {
        display: none;
      }

      .instruction-command {
        color: var(--ink);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.8125rem;
      }

      .icon-button {
        width: 2.5rem;
        height: 2.5rem;
        flex: 0 0 2.5rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .accordion-button {
        gap: 0.75rem;
      }

      .accordion-button:not(.collapsed) {
        background: #eff6ff;
        color: var(--brand-dark);
      }

      .source-wrap {
        position: relative;
      }

      .source-box {
        width: 100%;
        min-height: 360px;
        border: 1px solid var(--line);
        border-radius: 0.75rem;
        background: var(--paper);
        color: var(--ink);
        padding: 1rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.875rem;
        line-height: 1.65;
        resize: vertical;
      }

      .source-copy {
        position: absolute;
        top: 0.75rem;
        right: 0.75rem;
        background: rgba(255, 255, 255, 0.94);
      }

      @media (max-width: 575.98px) {
        .download-option {
          grid-template-columns: 2.5rem minmax(0, 1fr) 2.5rem;
        }

        .instruction-box {
          grid-column: 1 / -1;
          grid-row: 2;
        }

        .accordion-body {
          padding: 1rem;
        }

        .source-box {
          min-height: 300px;
          font-size: 0.8125rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="container site-shell py-4 py-md-5">
      <section class="prompt-section rounded-3 mb-3" aria-label="rapid-dev-skill.md 下载指令">
        <div class="download-option">
          <span class="system-icon" aria-hidden="true"><i class="bi bi-windows"></i></span>
          <span class="system-name">Windows</span>
          <div class="instruction-box">
            在项目根目录执行 <code class="instruction-command">Invoke-WebRequest -Uri "https://luckymaomi.github.io/superman/rapid-dev-skill.md" -OutFile "rapid-dev-skill.md"</code>，然后阅读 rapid-dev-skill.md，按步骤依次执行。
          </div>
          <button class="btn btn-light border icon-button copy-command" type="button" data-command="Invoke-WebRequest -Uri &quot;https://luckymaomi.github.io/superman/rapid-dev-skill.md&quot; -OutFile &quot;rapid-dev-skill.md&quot;" aria-label="复制 Windows 指令" title="复制">
            <i class="bi bi-copy" aria-hidden="true"></i>
          </button>
        </div>

      </section>

      <section class="skill-section rounded-4 overflow-hidden" aria-label="rapid-dev-skill.md 源文件">
        <div class="accordion accordion-flush">
          <div class="accordion-item">
            <div class="accordion-header">
              <button
                class="accordion-button collapsed"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#skillSource"
                aria-expanded="false"
                aria-controls="skillSource"
              >
                <i class="bi bi-file-earmark-text" aria-hidden="true"></i>
                <span class="fw-semibold">rapid-dev-skill.md</span>
              </button>
            </div>
            <div id="skillSource" class="accordion-collapse collapse">
              <div class="accordion-body">
                <div class="source-wrap">
                  <button class="btn btn-sm btn-light border source-copy" id="copySkill" type="button" aria-label="复制 rapid-dev-skill.md" title="复制">
                    <i class="bi bi-copy" aria-hidden="true"></i>
                  </button>
                  <textarea class="source-box" id="source" spellcheck="false" readonly aria-label="rapid-dev-skill.md 内容">正在读取...</textarea>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
      <div class="toast align-items-center text-bg-dark border-0" id="toast" role="status" aria-live="polite" aria-atomic="true">
        <div class="d-flex">
          <div class="toast-body" id="toastBody">已复制</div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="关闭"></button>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script>
      const source = document.getElementById('source');
      const copySkill = document.getElementById('copySkill');
      const toast = new bootstrap.Toast(document.getElementById('toast'));
      const toastBody = document.getElementById('toastBody');
      let skillText = '';

      function showToast(message) {
        toastBody.textContent = message;
        toast.show();
      }

      async function copyText(text, fallbackTarget) {
        try {
          await navigator.clipboard.writeText(text);
          return true;
        } catch (error) {
          if (fallbackTarget) {
            fallbackTarget.focus();
            fallbackTarget.select();
            return false;
          }

          const helper = document.createElement('textarea');
          helper.value = text;
          helper.setAttribute('readonly', '');
          helper.style.position = 'fixed';
          helper.style.opacity = '0';
          document.body.appendChild(helper);
          helper.select();
          const copied = document.execCommand('copy');
          helper.remove();
          return copied;
        }
      }

      async function loadSkill() {
        try {
          const response = await fetch('rapid-dev-skill.md', { cache: 'no-store' });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          skillText = await response.text();
          source.value = skillText;
        } catch (error) {
          source.value = [
            '无法读取 rapid-dev-skill.md。',
            '',
            '如果你直接双击打开 index.html，浏览器可能会限制本地文件读取。',
            '请通过静态文件服务访问本页面。',
            '',
            `错误：${error.message}`,
          ].join('\n');
          copySkill.disabled = true;
        }
      }

      document.querySelectorAll('.copy-command').forEach((button) => {
        button.addEventListener('click', async () => {
          const instruction = `在项目根目录执行 ${button.dataset.command}，然后阅读 rapid-dev-skill.md，按步骤依次执行。`;
          const copied = await copyText(instruction);
          showToast(copied ? '已复制指令' : '复制失败，请手动复制命令');
        });
      });

      copySkill.addEventListener('click', async () => {
        if (!skillText) return;
        const copied = await copyText(skillText, source);
        showToast(copied ? '已复制 rapid-dev-skill.md' : '已选中全文，请手动复制');
      });

      loadSkill();
    </script>
  </body>
</html>
